
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doggy Business</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: #121212;
  color: white;
}

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: 20px;
  background:
    radial-gradient(circle at 80% 20%, rgba(212,168,54,0.2), transparent 40%),
    radial-gradient(circle at 20% 80%, rgba(61,184,90,0.2), transparent 40%),
    #121212;
}

.brand {
  font-family: 'Bebas Neue';
  letter-spacing: 6px;
  color: #63d285;
  font-size: 24px;
  margin-bottom: 20px;
}

h1 {
  font-family: 'Bebas Neue';
  font-size: 72px;
  line-height: 0.9;
  margin: 0;
}

.green {
  color: #63d285;
}

.sub {
  opacity: 0.6;
  margin: 20px 0 40px;
}

.btn {
  width: 100%;
  max-width: 500px;
  margin: 10px auto;
  padding: 20px;
  border-radius: 8px;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  display: block;
}

.primary {
  background: #4aa165;
  color: white;
}

.secondary {
  border: 2px solid rgba(255,255,255,0.3);
  color: white;
}

.section {
  display: none;
  padding: 40px;
  text-align: center;
}

.active {
  display: block;
}
</style>
</head>

<body>

<div class="hero" id="home">
  <div class="brand">DOGGY BUSINESS</div>

  <h1>
    WE LIFT YOUR<br>
    DOG POO SO<br>
    <span class="green">YOU DON’T</span><br>
    HAVE TO.
  </h1>

  <p class="sub">Professional, hygienic garden waste removal.</p>

  <a class="btn primary" onclick="showSection('pricing')">
    ✅ Yes, I'm in — take me to prices
  </a>

  <a class="btn secondary" onclick="showSection('about')">
    🤔 Interested but need more info
  </a>
</div>

<div id="pricing" class="section">
  <h2>Pricing Section</h2>
  <p>This is where your pricing goes</p>
</div>

<div id="about" class="section">
  <h2>About Section</h2>
  <p>This is where your info goes</p>
</div>

<script>
function showSection(id) {
  document.getElementById('home').style.display = 'none';
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
